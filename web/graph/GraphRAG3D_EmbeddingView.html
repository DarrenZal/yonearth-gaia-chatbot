<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphRAG 3D Embedding View - YonEarth Knowledge Graph</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1a2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            overflow: hidden;
            color: #e0e0e0;
        }

        #graph-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 26, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            backdrop-filter: blur(10px);
        }

        #loading-screen.hidden {
            display: none;
        }

        .loading-content {
            text-align: center;
        }

        .loading-title {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .loading-spinner {
            border: 4px solid rgba(100, 200, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #00ffff;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .loading-status {
            color: #00ffff;
            font-size: 16px;
            margin-top: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Info Panel */
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            max-width: 380px;
            padding: 20px;
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #info-panel.collapsed {
            max-width: 60px;
            max-height: 60px;
            overflow: hidden;
            cursor: pointer;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toggle-btn {
            background: rgba(100, 200, 255, 0.2);
            border: 1px solid rgba(100, 200, 255, 0.3);
            color: #00ffff;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: rgba(100, 200, 255, 0.3);
        }

        .entity-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }

        .entity-name {
            font-size: 18px;
            font-weight: 600;
            color: #00ffff;
            margin-bottom: 8px;
        }

        .entity-type {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            font-size: 12px;
            color: #a0a0ff;
            margin-bottom: 10px;
        }

        .entity-description {
            color: #b0b0b0;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .entity-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-item {
            background: rgba(100, 200, 255, 0.1);
            padding: 8px;
            border-radius: 6px;
        }

        .stat-label {
            font-size: 11px;
            color: #808080;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: #00ffff;
            margin-top: 4px;
        }

        /* Controls Panel */
        #controls-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            max-width: 320px;
            padding: 20px;
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .control-section {
            margin-bottom: 20px;
        }

        .control-label {
            font-size: 13px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            display: block;
        }

        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mode-btn {
            padding: 10px;
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 6px;
            color: #a0a0a0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            text-align: center;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .mode-btn:hover:not(.active) {
            background: rgba(100, 200, 255, 0.2);
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: rgba(100, 200, 255, 0.05);
            border-radius: 6px;
        }

        .filter-checkbox {
            margin-right: 10px;
            cursor: pointer;
        }

        .filter-label {
            flex: 1;
            font-size: 13px;
            cursor: pointer;
        }

        .filter-count {
            font-size: 12px;
            color: #606060;
        }

        /* Search */
        #search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            max-width: 90vw;
            z-index: 1000;
        }

        #search-input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 25px;
            color: #e0e0e0;
            font-size: 15px;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }

        #search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        #search-input::placeholder {
            color: #606060;
        }

        /* Keyboard Shortcuts */
        #shortcuts-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(15, 20, 35, 0.8);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            color: #808080;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .shortcut-key {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(100, 200, 255, 0.2);
            border-radius: 3px;
            font-family: monospace;
            font-size: 11px;
            margin: 0 2px;
        }

        /* Stats Overlay */
        #stats-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 16px;
            background: rgba(15, 20, 35, 0.9);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 8px;
            font-size: 12px;
            color: #808080;
            backdrop-filter: blur(10px);
            z-index: 1000;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <!-- Graph Container -->
    <div id="graph-container"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-title">Loading Knowledge Graph</div>
            <div class="loading-spinner"></div>
            <div class="loading-status" id="loading-status">Initializing...</div>
        </div>
    </div>

    <!-- Search -->
    <div id="search-container">
        <input
            type="text"
            id="search-input"
            placeholder="Search entities (Ctrl+K)..."
            autocomplete="off"
        />
    </div>

    <!-- Info Panel -->
    <div id="info-panel">
        <div class="panel-header">
            <div class="panel-title">Knowledge Graph</div>
            <button class="toggle-btn" id="panel-toggle">−</button>
        </div>
        <div id="panel-content">
            <div>
                <strong>39,054 entities</strong> from 172 podcast episodes
            </div>
            <div style="margin-top: 10px; font-size: 13px; color: #808080;">
                Hover to preview connections • Click to explore neighborhood
            </div>
            <div class="entity-info" id="entity-info" style="display: none;">
                <div class="entity-name" id="entity-name"></div>
                <div class="entity-type" id="entity-type"></div>
                <div class="entity-description" id="entity-description"></div>
                <div class="entity-stats">
                    <div class="stat-item">
                        <div class="stat-label">Connections</div>
                        <div class="stat-value" id="entity-connections">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Centrality</div>
                        <div class="stat-value" id="entity-centrality">0.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div id="controls-panel">
        <div class="control-section">
            <label class="control-label">Visualization Mode</label>
            <div class="mode-selector">
                <div class="mode-btn active" data-mode="embedding">Embedding</div>
                <div class="mode-btn" data-mode="force">Force Graph</div>
            </div>
        </div>

        <div class="control-section">
            <label class="control-label">Entity Types</label>
            <div class="filter-controls" id="entity-type-filters"></div>
        </div>

        <div class="control-section">
            <label class="control-label">Display</label>
            <div class="filter-item">
                <input type="checkbox" id="show-clusters" class="filter-checkbox" checked>
                <label for="show-clusters" class="filter-label">Cluster Membranes</label>
            </div>
            <div class="filter-item">
                <input type="checkbox" id="show-labels" class="filter-checkbox" checked>
                <label for="show-labels" class="filter-label">Entity Labels</label>
            </div>
        </div>
    </div>

    <!-- Keyboard Shortcuts Hint -->
    <div id="shortcuts-hint">
        <span class="shortcut-key">E</span> Embedding view
        <span class="shortcut-key">F</span> Force view
        <span class="shortcut-key">ESC</span> Deselect
        <span class="shortcut-key">Ctrl+K</span> Search
    </div>

    <!-- Stats Overlay -->
    <div id="stats-overlay">
        <div>FPS: <span id="fps-counter">60</span></div>
        <div>Visible: <span id="visible-count">0</span> / <span id="total-count">0</span></div>
    </div>

    <!-- Dependencies -->
    <script src="https://unpkg.com/three@0.159.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.159.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/3d-force-graph@1.73.3/dist/3d-force-graph.min.js"></script>

    <!-- Our Code -->
    <script src="/graph/GraphRAG3D_EmbeddingView.js"></script>

    <script>
        // Initialize viewer when page loads
        document.addEventListener('DOMContentLoaded', () => {
            const viewer = new GraphRAG3DEmbeddingView('graph-container');
            viewer.init();
        });
    </script>
</body>
</html>
