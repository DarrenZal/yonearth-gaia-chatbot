events {
    worker_connections 1024;
}

http {
    # MIME types
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream app {
        server app:8000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=stt_limit:10m rate=30r/m;
    limit_req_status 429;  # return 429 (not default 503) on rate limit

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Main server block
    server {
        listen 80;
        server_name localhost 152.53.194.214;  # Accept both localhost and IP

        # Certbot challenge location
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Serve static web files
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ =404;

            # CORS headers for web interface
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        }

        # Public t-SNE podcast map: /podcast/ -> web/podcast/index.html
        # try_files ensures trailing-slash request resolves to index.html rather than 403.
        location /podcast/ {
            alias /var/www/html/podcast/;
            try_files $uri $uri/ /podcast/index.html;
            index index.html;
        }

        # Public knowledge graph wrapper: /graph/ -> web/graph/index.html (iframe-loads /KnowledgeGraph.html)
        location /graph/ {
            alias /var/www/html/graph/;
            try_files $uri $uri/ /graph/index.html;
            index index.html;
        }

        # Dev-only panel: full control surface, all map variants.
        # auth_basic gates the entire /dev/ tree; generate .htpasswd once via
        #   htpasswd -c /etc/nginx/.htpasswd darren
        # Under yonearth.org/guide/ Mode A, Artem's nginx MUST return 404 for
        # /guide/dev/* — dev stays exclusively on earthdo.me/dev/.
        location /dev/ {
            auth_basic "Y on Earth Dev";
            auth_basic_user_file /etc/nginx/.htpasswd;
            alias /var/www/html/dev/;
            try_files $uri $uri/ /dev/index.html;
            index index.html;
        }

        # STT endpoint — stricter rate limit + upload size cap.
        # Exact match so /api/stt/status falls through to the general /api/ block.
        location = /api/stt {
            client_max_body_size 10M;
            limit_req zone=stt_limit;  # strict 30 r/min, no burst, no nodelay

            proxy_request_buffering off;  # stream large audio uploads

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        }

        # API endpoints
        location /api/ {
            # Rate limiting
            limit_req zone=api burst=20 nodelay;

            # Remove /api prefix and proxy to backend
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;

            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type 'text/plain; charset=utf-8';
                add_header Content-Length 0;
                return 204;
            }
        }

        # Health check endpoint (bypass rate limiting)
        location /health {
            proxy_pass http://app;
            proxy_set_header Host $host;
            access_log off;
        }
    }

    # HTTPS server block (uncomment when SSL is set up)
    # server {
    #     listen 443 ssl http2;
